<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bridge App</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#333">

<style>
body {
    font-family: Arial;
    margin: 0;
    overflow: hidden;
}

.menu {
    background: #333;
    padding: 10px;
    display: flex;
    gap: 10px;
}

select {
    background: #444;
    color: white;
    padding: 10px;
    border: none;
}

.image-container {
    text-align: center;
    margin-top: 10px;
}

img {
    max-width: 90%;
    display: none;
    cursor: zoom-in;
}

.zoomed {
    transform: scale(2);
}
</style>
</head>

<body>

<div class="menu">
    <select onchange="showImage(this.value)">
        <option value="">Aperture</option>
        <option value="./img/aperture.png">Tabella</option>
        <option value="./img/duefiori.png">2 fiori</option>
        <option value="./img/sotto_aperture.png">SottoAperture</option>
    </select>

    <select onchange="showImage(this.value)">
        <option value="">Risposte</option>
        <option value="./img/risp_uno_nobile.png">1 Nobile</option>
        <option value="./img/risp_uno_minore.png">1 Minore</option>
        <option value="./img/risp_uno_sa.png">1 SA</option>
    </select>

    <select onchange="showImage(this.value)">
        <option value="">Altro</option>
        <option value="./img/avanzate.png">Avanzate</option>
        <option value="./img/gazzilli.png">Gazzilli</option>
    </select>
</div>

<div class="image-container" id="contenuto"></div>

<script>
function showImage(src) {
    const container = document.getElementById("contenuto");
    container.innerHTML = "";

    if (src) {
        const img = document.createElement("img");
        img.src = src;
        img.style.display = "block";

        img.onclick = () => {
            img.classList.toggle("zoomed");
        };

        container.appendChild(img);
    }
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
