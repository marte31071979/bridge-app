<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
<title>Appunti Martino</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1e1e1e">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
}

/* TOP BAR */
.header {
    display: flex;
    align-items: center;
    background: #1e1e1e;
    padding: 15px;
    font-size: 20px;
}

/* MENU BUTTON */
.menu-btn {
    font-size: 24px;
    margin-right: 15px;
    cursor: pointer;
}

/* SIDE MENU */
.sidebar {
    position: fixed;
    top: 0;
    left: -250px;
    width: 250px;
    height: 100%;
    background: #222;
    padding-top: 60px;
    transition: 0.3s;
}

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #333;
}

/* CONTENT */
.content {
    padding: 15px;
}

/* CARDS */
.card {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.card:hover {
    background: #333;
}

/* IMAGE */
img {
    max-width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    Bridge App
</div>

<div class="sidebar" id="sidebar">
    <a onclick="loadCategory('aperture')">Aperture</a>
    <a onclick="loadCategory('risposte')">Risposte</a>
    <a onclick="loadCategory('altro')">Altro</a>
</div>

<div class="content" id="content">
    <h2>Seleziona una categoria</h2>
</div>

<script>
const data = {
    aperture: [
        { name: "Tabella", img: "./img/aperture.png" },
        { name: "2 Fiori", img: "./img/duefiori.png" },
		{ name: "Sotto Apertura", img: "./img/sotto_aperture.png" }
    ],
    risposte: [
        { name: "1 Nobile", img: "./img/risp_uno_nobile.png" },
        { name: "1 Minore", img: "./img/risp_uno_minore.png" },
		{ name: "1 SA", img: "./img/risp_uno_sa.png" }
		
    ],
    altro: [
        { name: "Gazzilli", img: "./img/gazzilli.png" },
        { name: "Avanzate", img: "./img/avanzate.png" },
		{ name: "Intervento", img: "./img/intervento.png" },
		{ name: "Parziale Manche o Slam", img: "./img/p_m_s.png" },
		{ name: "Risposta contro Avversario", img: "./img/risp_contro_avversa.png" },
		{ name: "Cue Bid", img: "./img/cue_bid.png" },
		{ name: "Drury", img: "./img/drury.png" },
		{ name: "5 assi", img: "./img/rkcb.png" },
		{ name: "Attacco Asso", img: "./img/attacco_di_asso.png" },
		{ name: "3°di Mano(morto cartine)", img: "./img/terzo_di_mano_morto_cartine.png" },
		{ name: "3°di Mano(morto onore)", img: "./img/terzo_di_mano_morto_onore.png" },
		{ name: "3°di Mano(morto singolo)", img: "./img/terzo_di_mano_morto_singolo.png" },
		{ name: "Smazzate chiama/rifiuta", img: "./img/smazzate_illustrative.png" },
		{ name: "Correttivi Fit Conclamato", img: "./img/correttivi_fit_conclamato.png" }		
    ]
};

function toggleMenu() {
    const menu = document.getElementById("sidebar");
    menu.style.left = (menu.style.left === "0px") ? "-250px" : "0px";
}

function loadCategory(cat) {
    toggleMenu();
    const container = document.getElementById("content");
    container.innerHTML = "";

    data[cat].forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = item.name;

        div.onclick = () => {
            container.innerHTML = `
                <h2>${item.name}</h2>
                <img src="${item.img}" onclick="this.classList.toggle('zoomed')">
            `;
        };

        container.appendChild(div);
    });
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
