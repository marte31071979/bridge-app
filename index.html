<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="./favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
<title>Bridge App</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1e1e1e">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
}

/* TOP BAR */
.header {
    display: flex;
    align-items: center;
    background: #1e1e1e;
    padding: 15px;
    font-size: 20px;
}

/* MENU BUTTON */
.menu-btn {
    font-size: 24px;
    margin-right: 15px;
    cursor: pointer;
}

/* SIDE MENU */
.sidebar {
    position: fixed;
    top: 0;
    left: -250px;
    width: 250px;
    height: 100%;
    background: #222;
    padding-top: 60px;
    transition: 0.3s;
}

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #333;
}

/* CONTENT */
.content {
    padding: 15px;
}

/* CARDS */
.card {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.card:hover {
    background: #333;
}

/* IMAGE */
img {
    max-width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    Bridge App
</div>

<div class="sidebar" id="sidebar">
    <a onclick="loadCategory('aperture')">Aperture</a>
    <a onclick="loadCategory('risposte')">Risposte</a>
	<a onclick="loadCategory('interventi')">Interventi</a>
	<a onclick="loadCategory('avanzate')">Avanzate</a>
	<a onclick="loadCategory('convenzionali')">Convenzionali</a>
    <a onclick="loadCategory('altro')">Altro</a>
	<a onclick="mostraPreferiti()">⭐ Preferiti</a>
</div>

<div class="content" id="content">
    <h2>Seleziona una categoria</h2>
</div>

<script>
const data = {
    aperture: [
        { name: "Tabella", img: "./img/aperture.png" },
        { name: "2 Fiori", img: "./img/duefiori.png" },
		{ name: "Sotto Apertura", img: "./img/sotto_aperture.png" }
    ],
    risposte: [
        { name: "1 Nobile", img: "./img/risp_uno_nobile.png" },
        { name: "1 Minore", img: "./img/risp_uno_minore.png" },
		{ name: "1 SA", img: "./img/risp_uno_sa.png" }
		
    ],
	interventi : [
		    { name: "Apertore : Dopo intervento del 4°", img: "./img/Apertore_dopo_4_di_mano.png" },
			{ name: "Dichiarazioni Libere", img: "./img/dichiarazioni_libere.png" },
			{ name: "Su Intervento Colore", img: "./img/su_interv_colore.png" },
			{ name: "Intervento", img: "./img/intervento.png" }
	],
	avanzate : [
	    { name: "Avanzate", img: "./img/avanzate.png" },

		{ name: "Cue Bid", img: "./img/cue_bid.png" },
		{ name: "5 assi", img: "./img/rkcb.png" }
	],
	convenzionali : [
		{ name: "Gazzilli", img: "./img/gazzilli.png" },
		{ name: "Drury", img: "./img/drury.png" },
		{ name: "Puppet", img: "./img/puppet.png" }
	],
    altro: [
		{ name: "Parziale Manche o Slam", img: "./img/p_m_s.png" },
		{ name: "Risposta contro Avversario", img: "./img/risp_contro_avversa.png" },
		{ name: "Attacco Asso", img: "./img/attacco_di_asso.png" },
		{ name: "3°di Mano(morto cartine)", img: "./img/terzo_di_mano_morto_cartine.png" },
		{ name: "3°di Mano(morto onore)", img: "./img/terzo_di_mano_morto_onore.png" },
		{ name: "3°di Mano(morto singolo)", img: "./img/terzo_di_mano_morto_singolo.png" },
		{ name: "Smazzate chiama/rifiuta", img: "./img/smazzate_illustrative.png" },
		{ name: "Correttivi Fit Conclamato", img: "./img/correttivi_fit_conclamato.png" }		
    ]
};

function toggleMenu() {
    const menu = document.getElementById("sidebar");
    menu.style.left = (menu.style.left === "0px") ? "-250px" : "0px";
}

function loadCategory(cat) {
    toggleMenu();
    const container = document.getElementById("content");
    container.innerHTML = "";

    data[cat].forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
		// ICONE
		let icone = "";
		if (èPreferito(item)) icone += " ⭐";
		if (appunti[item.img]) icone += " 📝";

		div.innerHTML = item.name + icone;

	div.onclick = () => {
	  mostraDettaglio(item);
	};

        container.appendChild(div);
    });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(reg => {

      const LAST_CHECK = localStorage.getItem("lastUpdateCheck");
      const NOW = Date.now();

      // 24 ore = 86400000 ms
      if (!LAST_CHECK || (NOW - LAST_CHECK) > 86400000) {
        reg.update();
        localStorage.setItem("lastUpdateCheck", NOW);
      }

      // se aggiorna → ricarica
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });

    });
}

let preferiti = JSON.parse(localStorage.getItem("preferiti")) || [];

function salvaPreferiti() {
  localStorage.setItem("preferiti", JSON.stringify(preferiti));
}

let appunti = JSON.parse(localStorage.getItem("appunti")) || {};

function salvaAppunti() {
  localStorage.setItem("appunti", JSON.stringify(appunti));
}

function togglePreferito(item) {
  const index = preferiti.findIndex(p => p.img === item.img);

  if (index >= 0) {
    preferiti.splice(index, 1);
  } else {
    preferiti.push(item);
  }

  salvaPreferiti();
}

function èPreferito(item) {
  return preferiti.some(p => p.img === item.img);
}

function mostraPreferiti() {
  toggleMenu(); //
  const container = document.getElementById("content");
  container.innerHTML = "<h2>Preferiti</h2>";

  if (preferiti.length === 0) {
    container.innerHTML += "<p>Nessun preferito</p>";
    return;
  }

  preferiti.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

	let icone = "";

	if (èPreferito(item)) icone += " ⭐";
	if (appunti[item.img]) icone += " 📝";

	div.innerHTML = item.name + icone;


    div.onclick = () => {
        mostraDettaglio(item);
    };

    container.appendChild(div);
  });
}

function mostraDettaglio(item) {
  const container = document.getElementById("content");

  const isFav = èPreferito(item);

  const nota = appunti[item.img] || "";
  const hasNote = nota.trim() !== "";

  container.innerHTML = `
    <h2>${item.name}</h2>
    
    <button id="favBtn">
      ${isFav ? "⭐ Rimuovi dai preferiti" : "☆ Aggiungi ai preferiti"}
    </button>
	<div id="areaNota">
      ${
        hasNote
          ? `
          <textarea id="nota" style="width:100%; height:100px; border-radius:8px; padding:10px;">${nota}</textarea>
          <br><br>
          <button id="deleteNota">🗑️ Cancella nota</button>
          `
          : `<button id="addNota">✏️ Scrivi appunto</button>`
      }
    </div>
    <br><br>
    <img src="${item.img}">
  `;

 // 👉 SE NON C’È NOTA
  if (!hasNote) {
    document.getElementById("addNota").addEventListener("click", () => {
      document.getElementById("areaNota").innerHTML = `
        <textarea id="nota" style="width:50%; height:100px; border-radius:8px; padding:10px;" placeholder="Scrivi appunti..."></textarea>
      `;

      attivaSalvataggio(item);
    });
  } else {
    // 👉 SE GIÀ C’È NOTA
    attivaSalvataggio(item);
	// 👉 CANCELLA NOTA
    document.getElementById("deleteNota").addEventListener("click", () => {
      //if (confirm("Vuoi cancellare la nota?")) {
        delete appunti[item.img];
        salvaAppunti();
        mostraDettaglio(item); // aggiorna UI
//      }
    });
  }
  
  document.getElementById("favBtn").onclick = () => {
    togglePreferito(item);
    mostraDettaglio(item); // aggiorna UI
  };
}

function attivaSalvataggio(item) {
  const textarea = document.getElementById("nota");

  textarea.addEventListener("input", () => {
    appunti[item.img] = textarea.value;
    salvaAppunti();
  });
}

//}
</script>
<p style="text-align:center; opacity:0.6;">
  Versione 1.0.1
</p>
</body>
</html>
